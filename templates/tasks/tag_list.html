{% extends 'base.html' %}

{% block content %}
  <div class="d-flex align-items-center justify-content-between mb-4">
    <h1 class="m-0">Tags list</h1>
    <a class="btn btn-primary" href="{% url 'tasks:tag-create' %}">+ ADD NEW TAG</a>
  </div>
  {% if tag_list %}
      <table class="table">
        <tr>
          <th>Name</th>
          <th>Update</th>
          <th>Delete</th>
        </tr>

        {% for tag in tag_list %}
            <tr>
              <td>
                  {{ tag.name }}
              </td>
              <td>
                  <a class="btn btn-secondary" href="{% url "tasks:tag-update" pk=tag.id %}">Update</a>
              </td>
              <td>
                  <a class="btn btn-secondary" href="{% url "tasks:tag-delete" pk=tag.id %}">Delete</a>
              </td>
          </tr>
        {% endfor %}
      </table>

    {% else %}
      <h3>There are no tags yet.</h3>
    {% endif %}
{% endblock %}
